name: Atualizar Cardápio Semanal

on:
  schedule:
    # Roda toda segunda-feira às 07:00 (UTC) que no Brasil (GMT-3) cai às 04:00 da manhã
    - cron: '0 7 * * 1'
  workflow_dispatch: 

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install requests beautifulsoup4 urllib3

      - name: Rodar o Scraper (Atualiza script.js)
        run: python atualiza_cardapio.py

      - name: Commit e Push (Se houver mudança)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add script.js
          git commit -m "feat(ru): atualização automática semanal do cardápio" || echo "Nenhuma mudança no cardápio"
          git push