name: Deploy para o GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js (Versão Corrigida)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Executar Motor de Raspagem (Scraper)
        run: npm run scrape

      - name: Compilar o projeto React (Build)
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Upload do artefato compilado
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy final para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4